<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDVN — Toledo do Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0ede8;--card:#fff;--card2:#faf9f7;--border:#ddd9d0;--text:#1c1a17;--muted:#7a7670;--blue:#1e4fa3;--blue-l:#eaf0fc;--blue-m:#c3d5f7;--green:#166534;--red:#991b1b;--red-bg:#fee2e2;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.llogo{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ltitle{font-size:22px;font-weight:600;margin-bottom:32px}
.lbox input{width:100%;padding:12px 16px;font-family:inherit;font-size:16px;border:1.5px solid var(--border);border-radius:8px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:16px;transition:border-color .15s}
.lbox input:focus{border-color:var(--blue)}
.lbtn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer}
.lbtn:hover{opacity:.88}
.lerr{margin-top:12px;font-size:13px;color:var(--red);display:none}
#appScreen{display:none}
header{background:var(--blue);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px}
.hbadge{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}
.htitle{font-size:15px;font-weight:500;margin-left:14px}
.hout{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 12px;font-family:inherit;font-size:12px;cursor:pointer}
.main{max-width:980px;margin:0 auto;padding:28px 20px 60px;display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start}
.wcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.wchead{background:var(--blue);color:#fff;padding:14px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.wnav{display:flex;gap:6px}
.wnav button{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px}
.wnav button:hover{background:rgba(255,255,255,.28)}
.wdays{padding:8px}
.dbtn{display:flex;align-items:center;width:100%;padding:10px 12px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;gap:10px;text-align:left;margin-bottom:2px;transition:background .12s}
.dbtn:hover{background:var(--blue-l)}
.dbtn.active{background:var(--blue-l);border:1.5px solid var(--blue-m)}
.dnum{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
.dbtn.active .dnum{background:var(--blue);color:#fff}
.dname{font-size:13px;font-weight:500}
.dmeta{font-size:11px;color:var(--muted);margin-top:1px}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.esum{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7}
.esum b{color:var(--text);font-weight:600}
.bexport{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.bexport:hover{opacity:.88}
.bexport:disabled{opacity:.45;cursor:not-allowed}
.bclear{width:100%;margin-top:8px;padding:9px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer}
.bclear:hover{background:var(--red-bg);color:var(--red);border-color:#fca5a5}
.dpanel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dph{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2)}
.dpt{font-size:18px;font-weight:600}
.dpd{font-size:13px;color:var(--muted);margin-top:2px}
.badd{display:flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.badd:hover{opacity:.88}
.empty{padding:56px 24px;text-align:center;color:var(--muted)}
.eico{font-size:40px;margin-bottom:12px}
.etit{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px}
.edesc{font-size:13px;line-height:1.6}
.baddbig{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;margin-top:20px}
.elist{padding:16px;display:flex;flex-direction:column;gap:12px}
.entry{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ehead{display:flex;align-items:center;padding:10px 14px;background:var(--blue-l);border-bottom:1px solid var(--blue-m);gap:10px}
.enum{width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.etlabel{font-size:13px;font-weight:500;color:var(--blue);flex:1}
.brem{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1}
.brem:hover{color:var(--red);background:var(--red-bg)}
.efields{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;background:var(--card2)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--muted)}
.field input,.field select{font-family:inherit;font-size:14px;border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;background:#fff;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,79,163,.08)}
.field input[readonly]{background:var(--bg);color:var(--muted);cursor:default}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;transition:transform .3s ease;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warn{background:#d97706}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:720px){.main{grid-template-columns:1fr}.efields{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">Toledo do Brasil</div>
    <div class="ltitle">RDVN</div>
    <input type="password" id="pwd" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" onkeydown="if(event.key==='Enter')login()">
    <button class="lbtn" onclick="login()">Entrar</button>
    <div class="lerr" id="lerr">Senha incorreta.</div>
  </div>
</div>

<div id="appScreen">
  <header>
    <div style="display:flex;align-items:center">
      <span class="hbadge">Toledo</span>
      <span class="htitle">Relat&#243;rio de Despesa de Viagem Nacional</span>
    </div>
    <button class="hout" onclick="logout()">Sair</button>
  </header>
  <div class="main">
    <div>
      <div class="wcard">
        <div class="wchead">
          <span id="wlabel">Semana</span>
          <div class="wnav">
            <button onclick="changeWeek(-1)">&#8592;</button>
            <button onclick="changeWeek(1)">&#8594;</button>
          </div>
        </div>
        <div class="wdays" id="wdays"></div>
      </div>
      <div class="ecard">
        <div class="esum" id="esum">Nenhum lan&#231;amento ainda.</div>
        <button class="bexport" id="bexp" onclick="exportar()" disabled>&#8659; Exportar RDVN (.xlsm)</button>
        <button class="bclear" onclick="limpar()">Limpar semana</button>
      </div>
    </div>
    <div class="dpanel">
      <div class="dph">
        <div>
          <div class="dpt" id="dpt">-</div>
          <div class="dpd" id="dpd">-</div>
        </div>
        <button class="badd" onclick="addEntry()">&#43; Novo lan&#231;amento</button>
      </div>
      <div id="pbody"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

// Tipos de despesa
const TIPOS=[
  {id:30,label:"KM Administrativo Atual",       conta:"4000300",temKM:true, temVal:false,taxa:1.5},
  {id:40,label:"Refei\u00e7\u00e3o Raio \u2013 T\u00e9c.", conta:"4000301",temKM:false,temVal:true, taxa:0},
  {id:39,label:"Ped\u00e1gio / Estac. / T\u00e1xi",           conta:"4000301",temKM:false,temVal:true, taxa:0},
  {id:42,label:"Refei\u00e7\u00e3o Outros (NF) Adm.",         conta:"4000301",temKM:false,temVal:true, taxa:0}
];
const DIAS=["Segunda","Ter\u00e7a","Quarta","Quinta","Sexta"];
const ML=["janeiro","fevereiro","mar\u00e7o","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const MS=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

let woff=0,selISO="",wdata={};

// ── Auth ──
function login(){
  if(document.getElementById("pwd").value===SENHA){
    sessionStorage.setItem("ok","1");
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("appScreen").style.display="block";
    render();
  }else{
    document.getElementById("lerr").style.display="block";
    document.getElementById("pwd").value="";
  }
}
function logout(){
  sessionStorage.removeItem("ok");
  document.getElementById("appScreen").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
}
if(sessionStorage.getItem("ok")==="1"){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appScreen").style.display="block";
}

// ── Utils ──
function getMonday(off){var d=new Date(),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1)+off*7);d.setHours(0,0,0,0);return d;}
function iso(d){return d.toISOString().slice(0,10);}
function parseBR(s){return parseFloat(String(s).replace(",","."))||0;}
function xe(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function changeWeek(dir){woff+=dir;selISO="";render();}
// Convert JS Date to Excel serial number (days since 1899-12-30)
function excelSerial(d){return Math.floor(d.getTime()/86400000)+25569;}

// ── Render ──
function render(){
  var monday=getMonday(woff),friday=new Date(monday);friday.setDate(monday.getDate()+4);
  document.getElementById("wlabel").textContent=monday.getDate()+"\u2013"+friday.getDate()+" "+MS[monday.getMonth()]+" "+monday.getFullYear();
  if(!selISO){
    var today=iso(new Date()),found=false;
    for(var i=0;i<5;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);if(iso(d)===today){selISO=today;found=true;break;}}
    if(!found)selISO=iso(monday);
  }
  var c=document.getElementById("wdays");c.innerHTML="";
  for(var i=0;i<5;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var key=iso(d);if(!wdata[key])wdata[key]=[];
    var entries=wdata[key],active=key===selISO;
    var km=entries.reduce(function(s,e){return s+(e.km||0);},0);
    var val=entries.reduce(function(s,e){return s+(e.valor||0);},0);
    var meta=entries.length>0?(entries.length+" lan\u00e7."+(km?" \u2022 "+km+"km":"")+(val?" \u2022 R$"+val.toFixed(0):"")):"Toque para preencher";
    var btn=document.createElement("button");
    btn.className="dbtn"+(active?" active":"");
    (function(k){btn.onclick=function(){selISO=k;render();};})(key);
    btn.innerHTML="<div class='dnum'>"+d.getDate()+"</div><div><div class='dname'>"+DIAS[i]+"</div><div class='dmeta'>"+meta+"</div></div>";
    c.appendChild(btn);
  }
  updateSum();renderPanel();
}

function renderPanel(){
  var sel=new Date(selISO),monday=getMonday(woff);
  var diff=Math.round((sel-monday)/86400000);
  document.getElementById("dpt").textContent=(DIAS[diff]||"Dia")+"-feira";
  document.getElementById("dpd").textContent=sel.getDate()+" de "+ML[sel.getMonth()]+" de "+sel.getFullYear();
  var entries=wdata[selISO]||[],body=document.getElementById("pbody");
  if(entries.length===0){
    body.innerHTML="<div class='empty'><div class='eico'>&#128196;</div><div class='etit'>Nenhum lan\u00e7amento</div><div class='edesc'>Clique abaixo para registrar km rodados,<br>refei\u00e7\u00e3o, ped\u00e1gio ou outros gastos do dia.</div><button class='baddbig' onclick='addEntry()'>&#43; Adicionar lan\u00e7amento</button></div>";
    return;
  }
  var html="<div class='elist'>";
  for(var idx=0;idx<entries.length;idx++){
    var e=entries[idx];
    var tipo=TIPOS.find(function(t){return t.id===e.tipo;})||TIPOS[0];
    var opts="";
    for(var ti=0;ti<TIPOS.length;ti++){
      opts+="<option value='"+TIPOS[ti].id+"'"+(e.tipo===TIPOS[ti].id?" selected":"")+">"+TIPOS[ti].label+"</option>";
    }
    // Use data-* attributes — NEVER inline field names in handlers
    html+="<div class='entry'>"+
      "<div class='ehead'><div class='enum'>"+(idx+1)+"</div><div class='etlabel'>"+tipo.label+"</div>"+
      "<button class='brem' data-del='"+idx+"'>&#215;</button></div>"+
      "<div class='efields' style='grid-template-columns:1fr'>"+
        "<div class='field'><label>Tipo de Despesa</label>"+
        "<select class='sel-tipo' data-idx='"+idx+"'>"+opts+"</select></div>"+
        "<div class='field'><label>Descri\u00e7\u00e3o Detalhada</label>"+
        "<input class='inp' data-idx='"+idx+"' data-field='descricao' type='text' "+
        "value='"+xe(e.descricao||"")+"' placeholder='Ex: CAMPINAS - CASA, cliente, CASA'></div>"+
      "</div>"+
      "<div class='efields'>";
    if(tipo.temKM){
      html+="<div class='field'><label>KM Rodados</label>"+
        "<input class='inp inp-num' data-idx='"+idx+"' data-field='km' type='number' min='0' "+
        "value='"+(e.km||"")+"' placeholder='0'></div>";
    }
    if(tipo.temVal){
      html+="<div class='field'><label>Valor Pago (R$)</label>"+
        "<input class='inp inp-num' data-idx='"+idx+"' data-field='valor' type='number' min='0' step='0.01' "+
        "value='"+(e.valor||"")+"' placeholder='0,00'></div>";
    }
    // Show calculated KM value if KM type
    if(tipo.temKM&&e.km){
      html+="<div class='field'><label>Valor KM (calculado)</label>"+
        "<input type='text' value='R$ "+(e.km*1.5).toFixed(2).replace(".",",")+"' readonly></div>";
    }
    html+="<div class='field'><label>Conta Raz\u00e3o</label>"+
      "<input type='text' value='"+tipo.conta+"' readonly></div>"+
    "</div></div>";
  }
  html+="</div>";
  body.innerHTML=html;
  // Attach listeners via JS — zero inline handlers with field names
  body.querySelectorAll(".inp").forEach(function(el){
    el.addEventListener("input",function(){
      var i=parseInt(this.dataset.idx),f=this.dataset.field;
      wdata[selISO][i][f]=this.classList.contains("inp-num")?parseBR(this.value):this.value;
      updateSum();
    });
  });
  body.querySelectorAll(".sel-tipo").forEach(function(el){
    el.addEventListener("change",function(){
      var i=parseInt(this.dataset.idx);
      wdata[selISO][i].tipo=parseInt(this.value);
      wdata[selISO][i].km=0;wdata[selISO][i].valor=0;
      render();
    });
  });
  body.querySelectorAll(".brem").forEach(function(el){
    el.addEventListener("click",function(){
      wdata[selISO].splice(parseInt(this.dataset.del),1);render();
    });
  });
}

function addEntry(){
  if(!wdata[selISO])wdata[selISO]=[];
  wdata[selISO].push({tipo:30,descricao:"",km:0,valor:0});
  render();
  setTimeout(function(){var els=document.querySelectorAll(".entry");if(els.length)els[els.length-1].scrollIntoView({behavior:"smooth",block:"nearest"});},50);
}

function updateSum(){
  var monday=getMonday(woff),total=0,km=0,val=0,dias=0;
  for(var i=0;i<5;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var v=(wdata[iso(d)]||[]).filter(function(e){return e.descricao||e.km||e.valor;});
    if(v.length)dias++;total+=v.length;
    v.forEach(function(e){km+=(e.km||0);val+=(e.valor||0);});
  }
  var btn=document.getElementById("bexp"),html;
  if(total===0){
    html="Nenhum lan\u00e7amento ainda.<br>Selecione um dia e clique <b>+ Novo lan\u00e7amento</b>.";
    btn.disabled=true;
  }else{
    html="<b>"+dias+" dia(s)</b> \u2022 <b>"+total+" lan\u00e7amento(s)</b>";
    if(km)html+="<br>KM total: <b>"+km+" km</b>";
    if(val)html+="<br>Valor total: <b>R$ "+val.toFixed(2).replace(".",",")+"</b>";
    btn.disabled=false;
  }
  document.getElementById("esum").innerHTML=html;
}

function limpar(){
  if(!confirm("Limpar todos os dados da semana?"))return;
  var monday=getMonday(woff);
  for(var i=0;i<5;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);wdata[iso(d)]=[];}
  render();
}

// ── PATCH helpers ──
function patchSST(sst,idx,value){
  var count=0;
  return sst.replace(/<si>[\s\S]*?<\/si>/g,function(m){
    return count++===idx?"<si><t>"+xe(value)+"</t></si>":m;
  });
}

// Build one Excel row from entry data
// dateSerial: Excel serial (number) or 0 for empty
// isFirstOfDay: only first entry of each day gets the date in col A
function buildRow(rn, dateSerial, desc, tipo, cc, valor, km){
  var r=String(rn);
  var orig=ORIG_ROWS[r];
  if(!orig)return "";
  var row=orig;

  // A: date serial (number with date format) or empty
  if(dateSerial>0){
    row=row.replace('<c r="A'+r+'" s="62"/>',
      '<c r="A'+r+'" s="62"><v>'+dateSerial+'</v></c>');
  }
  // else leave A as empty self-closing (already is)

  // B: description as inlineStr
  row=row.replace('<c r="B'+r+'" s="65"/>',
    '<c r="B'+r+'" s="65" t="inlineStr"><is><t>'+xe(String(desc||""))+'</t></is></c>');

  // F: tipo code
  row=row.replace('<c r="F'+r+'" s="57"><v>1</v></c>',
    '<c r="F'+r+'" s="57"><v>'+tipo+'</v></c>');

  // G: centro de custo as inlineStr (reference spreadsheet uses '20808' string)
  if(cc){
    row=row.replace('<c r="G'+r+'" s="55"/>',
      '<c r="G'+r+'" s="55" t="inlineStr"><is><t>20808</t></is></c>');
  }

  // J: valor colaborador (refeição/pedágio)
  if(valor&&parseFloat(valor)>0){
    row=row.replace('<c r="J'+r+'" s="34"/>',
      '<c r="J'+r+'" s="34"><v>'+valor+'</v></c>');
  }

  // M: km rodados
  if(km&&parseFloat(km)>0){
    row=row.replace('<c r="M'+r+'" s="35"/>',
      '<c r="M'+r+'" s="35"><v>'+km+'</v></c>');
  }

  return row;
}

// ── EXPORT ──

// Add strings to SST, return updated SST and index map {string: index}
function addToSST(sst, strings){
  var items=[];
  var re=/<si>[\s\S]*?<\/si>/g, m;
  while((m=re.exec(sst))!==null) items.push(m);
  var baseIdx=items.length, additions="", idxMap={};
  for(var i=0;i<strings.length;i++){
    var s=strings[i];
    var escaped=xe(s);
    additions+="<si><t>"+escaped+"</t></si>";
    idxMap[s]=baseIdx+i;
  }
  var newSst=sst.replace("</sst>",additions+"</sst>");
  // Update count and uniqueCount attributes
  newSst=newSst.replace(/count="(\d+)"/,function(m,n){return 'count="'+(parseInt(n)+strings.length)+'"';});
  newSst=newSst.replace(/uniqueCount="(\d+)"/,function(m,n){return 'uniqueCount="'+(parseInt(n)+strings.length)+'"';});
  return {sst:newSst,idxMap:idxMap};
}

// Build one XML row with shared strings for B and G
function buildRow(rn, dateSerial, desc, tipo, hasCC, valor, km, idxMap){
  var r=String(rn);
  var row=ORIG_ROWS[r];
  if(!row)return "";

    // Row heights preserved from template ORIG_ROWS

  // A: Excel date serial number (style s="62" already has date format)
  if(dateSerial>0){
    row=row.replace('<c r="A'+r+'" s="62"/>',
      '<c r="A'+r+'" s="62"><v>'+dateSerial+'</v></c>');
  }

  // B: shared string index for description
  var descIdx=idxMap[desc];
  if(descIdx!==undefined){
    row=row.replace('<c r="B'+r+'" s="65"/>',
      '<c r="B'+r+'" s="65" t="s"><v>'+descIdx+'</v></c>');
  }

  // F: tipo code (integer — VLOOKUP uses this to find taxa)
  row=row.replace('<c r="F'+r+'" s="57"><v>1</v></c>',
    '<c r="F'+r+'" s="57"><v>'+tipo+'</v></c>');

  // G: centro de custo as shared string (MUST be shared string for Excel to accept)
  if(hasCC){
    var ccIdx=idxMap["20808"];
    if(ccIdx!==undefined){
      row=row.replace('<c r="G'+r+'" s="55"/>',
        '<c r="G'+r+'" s="55" t="s"><v>'+ccIdx+'</v></c>');
    }
  }

  // J: valor colaborador
  if(valor&&parseFloat(valor)>0){
    row=row.replace('<c r="J'+r+'" s="34"/>',
      '<c r="J'+r+'" s="34"><v>'+valor+'</v></c>');
  }

  // M: km rodados
  if(km&&parseFloat(km)>0){
    row=row.replace('<c r="M'+r+'" s="35"/>',
      '<c r="M'+r+'" s="35"><v>'+km+'</v></c>');
  }

  return row;
}

async function exportar(){
  var monday=getMonday(woff),friday=new Date(monday);friday.setDate(monday.getDate()+4);
  var sheetRows=[],periodDays=[];

  for(var i=0;i<5;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var key=iso(d);
    var entries=(wdata[key]||[]).filter(function(e){return e.descricao||e.km||e.valor;});
    if(entries.length===0)continue;
    periodDays.push(d.getDate());
    var dateSerial=excelSerial(d);
    entries.forEach(function(e,ei){
      var tipo=TIPOS.find(function(t){return t.id===e.tipo;})||TIPOS[0];
      var desc=e.descricao||"";
      // Split into chunks of 114 chars max (57 chars x 2 lines per cell)
      var CHUNK=114, chunks=[], rem=desc;
      while(rem.length>CHUNK){
        // Try to break at last space before limit
        var bp=rem.lastIndexOf(" ",CHUNK);
        if(bp<=0) bp=CHUNK;
        chunks.push(rem.substring(0,bp).trim());
        rem=rem.substring(bp).trim();
      }
      if(rem.length>0) chunks.push(rem);
      if(chunks.length===0) chunks=[""];
      // First chunk: full data
      sheetRows.push({
        dateSerial:ei===0?dateSerial:0,
        desc:chunks[0],
        tipo:e.tipo,
        hasCC:e.tipo!==1,
        valor:tipo.temVal?(e.valor||0):0,
        km:tipo.temKM?(e.km||0):0
      });
      // Extra chunks: continuation lines (tipo=1, no data)
      for(var ci=1;ci<chunks.length;ci++){
        sheetRows.push({dateSerial:0,desc:chunks[ci],tipo:1,hasCC:false,valor:0,km:0});
      }
    });
  }

  if(sheetRows.length===0){toast("Nenhum lan\u00e7amento!","warn");return;}
  if(sheetRows.length>14){toast("M\u00e1ximo 14 linhas!","warn");return;}

  var periodo=periodDays.length===0?monday.getDate()+" A "+friday.getDate()
    :periodDays.length===1?String(periodDays[0])
    :periodDays[0]+" A "+periodDays[periodDays.length-1];

  var btn=document.getElementById("bexp");
  btn.innerHTML="<div class='spin'></div> Gerando...";btn.disabled=true;

  try{
    var raw=b64bytes(TMPL_B64);
    var zip=await JSZip.loadAsync(raw);

    // 1. Get SST and add all needed strings
    var sst=await zip.file("xl/sharedStrings.xml").async("string");
    // Collect unique strings: periodo (replaces index 126), '20808', all descriptions
    var uniqueDescs=[];
    sheetRows.forEach(function(sr){if(sr.desc&&uniqueDescs.indexOf(sr.desc)<0)uniqueDescs.push(sr.desc);});
    var toAdd=["20808"].concat(uniqueDescs);
    var sstResult=addToSST(sst,toAdd);
    var newSST=sstResult.sst;
    var idxMap=sstResult.idxMap;
    // Patch periodo at index 128 (new template)
    var count128=0;
    newSST=newSST.replace(/<si>[\s\S]*?<\/si>/g,function(m){
      return count128++===128?"<si><t>"+xe(periodo)+"</t></si>":m;
    });
    zip.file("xl/sharedStrings.xml",newSST);

    // 2. Force recalculation on open
    var wbXml=await zip.file("xl/workbook.xml").async("string");
    wbXml=wbXml.replace('<calcPr calcId="191029"/>','<calcPr calcId="191029" fullCalcOnLoad="1"/>');
    zip.file("xl/workbook.xml",wbXml);

    // 3. Patch sheet rows
    var xml=await zip.file("xl/worksheets/sheet1.xml").async("string");
    for(var i=0;i<14;i++){
      var rn=8+i;
      var orig=ORIG_ROWS[String(rn)];
      if(!orig)continue;
      var newRow;
      if(i<sheetRows.length){
        var sr=sheetRows[i];
        newRow=buildRow(rn,sr.dateSerial,sr.desc,sr.tipo,sr.hasCC,sr.valor,sr.km,idxMap);
      }else{
        newRow=orig;
      }
      xml=xml.replace(orig,newRow);
    }
    zip.file("xl/worksheets/sheet1.xml",xml);

    var blob=await zip.generateAsync({
      type:"blob",
      mimeType:"application/vnd.ms-excel.sheet.macroEnabled.12",
      compression:"DEFLATE",compressionOptions:{level:6}
    });
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;
    a.download="Relatório de "+periodo+".xlsm";
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    toast("\u2713 Exportado com sucesso!","success");
  }catch(err){
    console.error(err);toast("Erro: "+err.message,"error");
  }finally{
    btn.innerHTML="&#8659; Exportar RDVN (.xlsm)";updateSum();
  }
}

function b64bytes(b64){var bin=atob(b64),arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;}
function toast(msg,type){var el=document.getElementById("toast");el.textContent=msg;el.className="toast "+(type||"success")+" show";setTimeout(function(){el.classList.remove("show");},3000);}

if(sessionStorage.getItem("ok")==="1")render();
